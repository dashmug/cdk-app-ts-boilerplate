name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - "**"

permissions: read-all

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  continuous-integration:
    name: Standard NodeJS checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node 20.x
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "20.x"
          cache: "yarn"

      - name: Install Node dependencies
        run: yarn install --frozen-lockfile

      - name: Check uncommitted formatting changes
        run: yarn prettier . --check

      - name: Check for linting errors
        run: yarn lint

      - name: Typecheck
        run: yarn typecheck

      - name: Test
        run: yarn test --ci

  deployment-check:
    name: Check deployment artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Set up Node 20.x
        uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: "20.x"
          cache: "yarn"

      - name: Install Node dependencies for deployment
        run: yarn install --production
        env:
          HUSKY: 0

      - name: Synthesize CloudFormation template and assets
        run: yarn synth

      - name: Check synthesized CloudFormation template with Checkov
        uses: bridgecrewio/checkov-action@785517c1aa34c033828b1aa855b5adb57fcf238f
        with:
          directory: cdk.out
          framework: cloudformation

      - name: Check Github Actions configuration with Checkov
        uses: bridgecrewio/checkov-action@785517c1aa34c033828b1aa855b5adb57fcf238f
        with:
          directory: .github
          framework: github_actions

  shell-check:
    name: Check shell scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # 2.0.0
        with:
          ignore_paths: >-
            .husky/_
            node_modules
